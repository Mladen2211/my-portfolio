name: Build & Push Docker Images

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  FRONTEND_IMAGE: ghcr.io/${{ github.repository }}-frontend
  STRAPI_IMAGE: ghcr.io/${{ github.repository }}-strapi

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push Strapi
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.STRAPI_IMAGE }}:latest
            ${{ env.STRAPI_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=strapi
          cache-to: type=gha,mode=max,scope=strapi

      - name: Build & push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_STRAPI_URL=http://strapi:1337
            NEXT_PUBLIC_SITE_URL=https://mraguz.me
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
